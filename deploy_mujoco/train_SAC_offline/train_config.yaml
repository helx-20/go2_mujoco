go2_task: "terrain"
go2_config: "go2.yaml"
terrain_config: "terrain_config.yaml"

# Offline-only training budget (number of optimization updates)
total_updates: 3000
gradient_steps_per_update: 1
max_episode_steps: 35

# Device / Torch runtime
device: "cuda:0"
seed: 0
torch_deterministic: false
cudnn_benchmark: true
allow_tf32: true
torch_num_threads: 0

# SAC hyperparameters
learning_rate: 0.0003
batch_size: 256
buffer_size: 1000000
tau: 0.005
gamma: 0.99

# Optional warm-start
preload_model_path: ""

# Offline data paths (dirs or .pkl files)

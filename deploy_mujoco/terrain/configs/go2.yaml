## NOTES
# 注意将这里的参数与 isaaclab 训练时的参数对齐，部分参数对应如下：
# - kps, kds: `source/isaaclab_assets/isaaclab_assets/robots/unitree.py`下对应`stiffness`和`damping`
# - default_angles: 见`source/isaaclab_assets/isaaclab_assets/robots/unitree.py`的`init_state`
# - lin_vel_scale, ang_vel_scale, dof_pos_scale, dof_vel_scale: 见`source/isaaclab_tasks/isaaclab_tasks/manager_based/locomotion/velocity/velocity_env_cfg.py`下的`ObsTerm`，缺省为`1`
# - action_scale: `source/isaaclab_tasks/isaaclab_tasks/manager_based/locomotion/velocity/config/go2/rough_env_cfg.py`中reduce到`0.25`
# - cmd_scale: 对应`[lin_vel_x_scale, lin_vel_y_scale, ang_vel_scale]`因此缺省为`[1,1,1]`
## delete this later

policy_path: "pre_train/go2/go2_controller.pt"
xml_path: "deploy_mujoco/robots/go2/scene_terrain.xml"

# Total simulation time
simulation_duration: 60.0
# Simulation time step
simulation_dt: 0.002
# Controller update frequency (meets the requirement of simulation_dt * controll_decimation=0.02; 50Hz)
control_decimation: 10 # 0.02
policy_decimation: 20
lock_camera: True

kps: [20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20]
kds: [0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5]

default_angles: [0.1, 0.8, -1.5, -0.1, 0.8, -1.5,
                 0.1, 1.0, -1.5, -0.1, 1.0, -1.5]

lin_vel_scale: 2.0
ang_vel_scale: 0.25
dof_pos_scale: 1.0
dof_vel_scale: 0.05
action_scale: 0.25
cmd_scale: [2.0, 2.0, 0.25]
num_actions: 12
#num_obs: 45
num_obs: 48

# isaaclab default set heading_command True
# our pre_trained model use heading_command True so you may retrain policy if you want to use heading_command False
# heading_command: False # using cmd_init[2] directly controll yaw speed
# heading_command: True  # use the heading_target controll target yaw (cmd_init[2] is ignored)
heading_command: True
heading_target: 1.0 # yaw target in [-pi, pi] (facing to)
heading_stiffness: 0

cmd_init: [1.0, 0, 0] # move forward [-1,1]
# cmd_init: [0, 0.5, 0] # pan
# cmd_init: [0, 0, 0.5] # turn around
# cmd_init: [0, 0, 0]   # stop

init_skip_time: 2

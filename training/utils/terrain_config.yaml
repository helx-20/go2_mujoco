# 动态地形配置文件，可用于动态交互  后续摩擦等参数加在这里
terrain_action:
  terrain_types: ["bump"]

  # bump 圆心前向距离范围（米）
  min_forward_dist: 0.1
  max_forward_dist: 0.8

  # bump 横向偏移范围（米）
  max_lateral: 0.30

  # bump 半径范围（米）
  radius_min: 0.1
  radius_max: 0.5

  # bump 最大高度（米）
  max_bump_height: 0.10

  # 机器人附近地形不修改半径（米）
  no_change_radius: 0.45

  terrain_decimation: 20


# 初始化梅花桩参数，可用于xxx  # TODO
plum_blossom:
  foot_clearance_m: 0.05


# 可视化配置
visualization:
  render: False
  lock_camera: True
  realtime_sim: False

logging:
  # If true, info includes per-substep Go2 rollout traces (large payload).
  enable_trace: True

# 奖励和事件配置
event_and_reward:
  # 失败事件开关（可选关闭）
  failure_flags:
    fallen: True
    collided: False
    base_collision: True
    thigh_collision: True
    stuck: True

  # reward
  # ===== 摔倒 =====
  fall_height_threshold: 0.15
  fall_angle_threshold: 1.3
  fall_reward: 5.0

  # ===== 碰撞 =====
  collision_force_threshold: 80.0
  collision_reward: 0.0
  base_collision_reward: 6.0
  thigh_collision_reward: 2.0

  # ===== 失稳 =====
  tilt_reward_scale: 0.0

  # ===== 速度惩罚 =====
  target_speed: 1.0
  speed_reward_scale: 0
  stuck_speed_threshold: 0.05
  stuck_reward: 2.0

  repeat_reward: False
  # positive episodic success reward given when episode ends by time-limit (non-failure)
  success_reward: 1.0


# 终止条件
termination:
  terminate_on_fall: True
  terminate_on_base_collision: True
  terminate_on_thigh_collision: True
  terminate_on_stuck: True
  terminate_on_terrain_edge: True
  terrain_edge_margin: 1.0


# 训练观测值配置
observation:
  include_last_action: False
  include_foot_contacts: False
  contact_force_threshold: 1.0
  local_height_map:
    enabled: true
    size_m: 0.8
    resolution_m: 0.2

